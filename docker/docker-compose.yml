version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: nhm-crm-pharmavet:prod
    env_file:
      - ./.env.prod
    volumes:
      - ../storage:/var/www/storage
      - ../bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      - db
    networks:
      - appnet

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nhm_crm_pharmavet
      POSTGRES_USER: nhm_user
      POSTGRES_PASSWORD: nhm_password
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - appnet

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../public:/var/www/public:ro
      - ../storage:/var/www/storage:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - appnet

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done"]
    networks:
      - appnet

  queue:
    image: nhm-crm-pharmavet:prod
    env_file:
      - ./.env.prod
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=120"]
    depends_on:
      - db
    networks:
      - appnet

  scheduler:
    image: nhm-crm-pharmavet:prod
    env_file:
      - ./.env.prod
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - db
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  dbdata:
